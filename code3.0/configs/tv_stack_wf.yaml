# TV indicator 4-stack WF config
# Uses exact 36-feature HMM matrix from the golden model (ret89% sh4.10)
hmm:
  features:
    - hmm_feat_ret
    - hmm_feat_rsi
    - hmm_feat_atr
    - hmm_feat_vol
    - hmm_feat_hma_slope
    - hmm_feat_bb_width
    - hmm_feat_macd
    - ehlers_filter_filt
    - ehlers_filter_bull
    - ehlers_filter_bear
    - supertrend_bull
    - supertrend_bear
    - supertrend_value
    - supertrend_upper
    - supertrend_lower
    - ichimoku_tenkan
    - ichimoku_kijun
    - ichimoku_senkou_a
    - ichimoku_senkou_b
    - ichimoku_chikou
    - ichimoku_cloud_top
    - ichimoku_cloud_bottom
    - ichimoku_price_above_cloud
    - ichimoku_price_below_cloud
    - ichimoku_price_in_cloud
    - ichimoku_tk_cross_up
    - ichimoku_tk_cross_down
    - ichimoku_kumo_twist_up
    - ichimoku_kumo_twist_down
    - ichimoku_cloud_bullish
    - ichimoku_cloud_bearish
    - elder_ray_bull
    - elder_ray_bear
    - elder_ray_bull_power
    - elder_ray_bear_power
    - elder_ray_ema

tv_indicators:
  ehlers_filter:
    enabled: true
    integration_mode: hmm
    period: 20
    filter_column_bull: ehlers_filter_slope
    filter_column_bear: ehlers_filter_slope
  supertrend:
    enabled: true
    integration_mode: hmm
  ichimoku:
    enabled: true
    integration_mode: hmm
  elder_ray:
    enabled: true
    integration_mode: hmm
    period: 13
    filter_column_bull: elder_ray_bull_power
    filter_column_bear: elder_ray_bear_power
