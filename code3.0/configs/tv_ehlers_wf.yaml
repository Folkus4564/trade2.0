# Walk-forward for ehlers_filter alone (50.59% return, Sharpe 1.64 from TV research)
# Tested with --use-best-baseline: 4H regime, 2-state HMM, max_hold_bars=48
strategy:
  regime_timeframe: 4H

hmm:
  n_states: 2
  sizing_max: 2.0
  features:
    - hmm_feat_ret
    - hmm_feat_rsi
    - hmm_feat_atr
    - hmm_feat_vol
    - hmm_feat_hma_slope
    - hmm_feat_bb_width
    - hmm_feat_macd
    - ehlers_filter_filt
    - ehlers_filter_bull
    - ehlers_filter_bear

risk:
  base_allocation_frac: 0.90
  max_hold_bars: 48

tv_indicators:
  luxalgo_fvg_ob:
    enabled: false
  ehlers_filter:
    enabled: true
    integration_mode: hmm
    period: 20
    filter_column_bull: ehlers_filter_slope
    filter_column_bear: ehlers_filter_slope
