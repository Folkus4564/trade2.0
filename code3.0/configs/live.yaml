reporting:
  interval_hours: 4
  report_dir: "artefacts/live_reports"
  trade_log_dir: "artefacts/live_trades"

retrain:
  enabled: true
  schedule: "sunday"          # day to run weekly retrain (sunday or saturday)
  mode: "full"                # full = retrain from scratch; warm = adapt existing model
  close_positions: true       # close all open positions before model swap
  backup_model: true          # backup .pkl before overwriting
  original_1h: "data/raw/XAUUSD_1H_2019_2024.csv"   # base 1H dataset
  live_data_dir: "data/raw"   # where DataAccumulator writes live bar CSVs
  warm_update_bars: 6500      # bars to use in warm mode (~6 months of 1H data)
  warm_n_iter: 30             # EM iterations for warm update
