indicators:
- category: trend
  default_params:
    atr_mult: 1.6
    atr_period: 5
  description: Supertrend flip occurs only after price stretches into a local range
    boundary
  filter_column_bear: supertrend_range_flip_bear
  filter_column_bull: supertrend_range_flip_bull
  integration_mode: both
  name: supertrend_range_flip
  technique: range_mean_reversion
- category: volume
  default_params:
    lower_band: 15
    mfi_period: 7
    upper_band: 85
  description: Money Flow Index reaches an extreme and price reverts from a range
    edge
  filter_column_bear: mfi_exhaustion_revert_bear
  filter_column_bull: mfi_exhaustion_revert_bull
  integration_mode: both
  name: mfi_exhaustion_revert
  technique: range_mean_reversion
- category: volume
  default_params:
    cmf_period: 8
    divergence_lookback: 6
  description: Price tests range extreme while Chaikin Money Flow diverges against
    the move
  filter_column_bear: cmf_range_divergence_bear
  filter_column_bull: cmf_range_divergence_bull
  integration_mode: both
  name: cmf_range_divergence
  technique: range_mean_reversion
- category: volume
  default_params:
    obv_lookback: 8
    range_period: 10
  description: OBV fails to confirm price test of range high or low, favoring fade
  filter_column_bear: obv_failure_at_edge_bear
  filter_column_bull: obv_failure_at_edge_bull
  integration_mode: both
  name: obv_failure_at_edge
  technique: range_mean_reversion
- category: momentum
  default_params:
    roc_period: 4
    threshold: 0.6
  description: Rate-of-change spikes into exhaustion at a range edge and then reverses
  filter_column_bear: roc_exhaustion_fade_bear
  filter_column_bull: roc_exhaustion_fade_bull
  integration_mode: both
  name: roc_exhaustion_fade
  technique: range_mean_reversion
- category: momentum
  default_params:
    long_period: 8
    short_period: 4
    signal_period: 3
  description: True Strength Index diverges at a range extreme and price rotates inward
  filter_column_bear: tsi_divergence_revert_bear
  filter_column_bull: tsi_divergence_revert_bull
  integration_mode: both
  name: tsi_divergence_revert
  technique: range_mean_reversion
- category: momentum
  default_params:
    rvi_period: 6
    signal_period: 3
  description: Relative Vigor Index fails to confirm a price extreme, supporting reversion
  filter_column_bear: rvi_divergence_revert_bear
  filter_column_bull: rvi_divergence_revert_bull
  integration_mode: both
  name: rvi_divergence_revert
  technique: range_mean_reversion
- category: momentum
  default_params:
    fast_period: 6
    signal_period: 4
    slow_period: 13
  description: MACD histogram peaks at range edge and rolls over back toward center
  filter_column_bear: macd_histogram_fade_bear
  filter_column_bull: macd_histogram_fade_bull
  integration_mode: both
  name: macd_histogram_fade
  technique: range_mean_reversion
- category: mean_reversion
  default_params:
    period: 10
    threshold: 0.4
  description: Detrended Price Oscillator extreme indicates short-term overextension
    inside a range
  filter_column_bear: dpo_mean_reversion_bear
  filter_column_bull: dpo_mean_reversion_bull
  integration_mode: both
  name: dpo_mean_reversion
  technique: range_mean_reversion
- category: mean_reversion
  default_params:
    period: 10
    std_mult: 1.2
  description: Price deviates from a short regression line and reverts after stall
  filter_column_bear: linreg_deviation_fade_bear
  filter_column_bull: linreg_deviation_fade_bull
  integration_mode: both
  name: linreg_deviation_fade
  technique: range_mean_reversion
